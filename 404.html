<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Trevor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      :root {
        --bg: #f8faf7;
        --surface: #ffffff;
        --surface-soft: #eef4f0;
        --text: #17201b;
        --muted: #5d6a62;
        --line: #dce5df;
        --primary: #2f6f58;
        --primary-dark: #245644;
        --accent: #b46a3c;
        --shadow: 0 20px 45px rgba(26, 45, 36, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", Arial, sans-serif;
      }

      a,
      button {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page-nav {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 72px;
        padding: 0 6vw;
        border-bottom: 1px solid rgba(220, 229, 223, 0.82);
        background: rgba(248, 250, 247, 0.9);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        overflow: hidden;
        border-radius: 50%;
      }

      .brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.16);
      }

      main {
        display: grid;
        place-items: center;
        width: min(900px, 88vw);
        margin: auto;
        padding: 110px 0 48px;
      }

      .lost-panel {
        position: relative;
        width: 100%;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(30px, 7vw, 72px);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .lost-panel::after {
        content: "404";
        position: absolute;
        right: -0.04em;
        bottom: -0.3em;
        color: var(--surface-soft);
        font-size: clamp(10rem, 30vw, 22rem);
        font-weight: 800;
        line-height: 1;
        pointer-events: none;
      }

      .lost-content {
        position: relative;
        z-index: 1;
        max-width: 620px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 6rem);
        line-height: 1;
      }

      .message {
        max-width: 540px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .status-line {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        margin-top: 22px;
        color: var(--primary-dark);
        font-size: 0.78rem;
        font-weight: 700;
      }

      .status-line::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 0 5px rgba(47, 111, 88, 0.1);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 11px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 18px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button.primary {
        color: #ffffff;
        background: var(--primary);
      }

      .button.primary:hover {
        background: var(--primary-dark);
      }

      .button.secondary {
        border-color: var(--line);
        color: var(--text);
        background: var(--surface);
      }

      @media (max-width: 520px) {
        .page-nav {
          min-height: 64px;
        }

        main {
          width: 90vw;
          padding-top: 90px;
        }

        .lost-panel {
          padding: 28px 22px 120px;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-nav">
      <a class="brand" href="index.html" aria-label="Trevor home">
        <span class="brand-mark">
          <img src="assets/nav-sticker.jpg" alt="" aria-hidden="true" />
        </span>
        <span>Trevor</span>
      </a>
    </header>

    <main>
      <section class="lost-panel">
        <div class="lost-content">
          <p class="eyebrow">Page not found</p>
          <h1>That page isn’t here.</h1>
          <p class="message">
            The link may be old, mistyped, or still waiting to be built. The rest of
            Trevor’s website is still nearby.
          </p>
          <span class="status-line" id="lost-note">No problem. Let’s get you somewhere useful.</span>
          <div class="actions">
            <a class="button primary" href="index.html">
              <i class="fa-solid fa-house" aria-hidden="true"></i>
              Go home
            </a>
            <button class="button secondary" id="surprise" type="button">
              <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
              Surprise me
            </button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const destinations = [
        "daily-verse.html",
        "spotify.html",
        "work-with-me.html",
        "shop.html",
      ];

      document.querySelector("#surprise").addEventListener("click", () => {
        const destination =
          destinations[Math.floor(Math.random() * destinations.length)];
        window.location.href = destination;
      });
    </script>
    <script src="easter-eggs.js" defer></script>
  </body>
</html>
