<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Verse | Trevor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="page-transitions.css" />
    <script src="page-transitions.js" defer></script>
    <style>
      :root {
        --bg: #f8faf7;
        --surface: #ffffff;
        --surface-soft: #eef4f0;
        --text: #17201b;
        --muted: #5d6a62;
        --line: #dce5df;
        --primary: #2f6f58;
        --primary-dark: #245644;
        --accent: #b46a3c;
        --shadow: 0 20px 45px rgba(26, 45, 36, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", Arial, sans-serif;
        line-height: 1.6;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 12% 14%, rgba(47, 111, 88, 0.09), transparent 24%),
          radial-gradient(circle at 86% 8%, rgba(180, 106, 60, 0.1), transparent 22%);
        pointer-events: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .verse-nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 72px;
        padding: 0 6vw;
        background: rgba(248, 250, 247, 0.9);
        border-bottom: 1px solid rgba(220, 229, 223, 0.8);
        backdrop-filter: blur(14px);
      }

      .brand,
      .back-link,
      .button,
      .tab-btn {
        display: inline-flex;
        align-items: center;
      }

      .brand {
        gap: 10px;
        font-weight: 800;
      }

      .brand-mark {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        background: var(--primary);
        color: #fff;
        border-radius: 50%;
        font-size: 0.85rem;
        overflow: hidden;
      }

      .brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.16);
      }

      .back-link {
        gap: 8px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 800;
        transition: color 180ms ease, transform 180ms ease;
      }

      .back-link:hover {
        color: var(--primary-dark);
        transform: translateX(-2px);
      }

      .page-hero {
        padding: 88px 6vw 44px;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        overflow-wrap: anywhere;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.1;
      }

      h1 {
        max-width: 820px;
        margin: 0 auto;
        font-size: clamp(2.7rem, 7vw, 5.2rem);
      }

      .hero-sub {
        max-width: 640px;
        margin: 18px auto 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .wrap {
        width: min(880px, calc(100% - 12vw));
        margin: 0 auto;
      }

      .verse-card,
      .game-card {
        position: relative;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .verse-card {
        padding: clamp(26px, 5vw, 46px);
      }

      .verse-card::before {
        content: "";
        position: absolute;
        top: -48px;
        right: -48px;
        width: 150px;
        height: 150px;
        background: rgba(47, 111, 88, 0.08);
        border-radius: 50%;
      }

      .verse-date,
      .verse-ref {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .verse-text {
        position: relative;
        z-index: 1;
        margin: 18px 0;
        color: var(--text);
        font-size: clamp(1.25rem, 3vw, 1.8rem);
        font-weight: 700;
        line-height: 1.45;
      }

      .actions,
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button,
      .tab-btn,
      .option-btn {
        font: inherit;
        cursor: pointer;
      }

      .button {
        justify-content: center;
        gap: 9px;
        min-height: 46px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 18px;
        font-weight: 800;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button:active:not(:disabled),
      .tab-btn:active:not(:disabled),
      .option-btn:active:not(:disabled),
      .audio-control:active:not(:disabled) {
        transform: scale(0.97);
      }

      .button:focus-visible,
      .tab-btn:focus-visible,
      .option-btn:focus-visible,
      .audio-control:focus-visible {
        outline: 3px solid rgba(47, 111, 88, 0.24);
        outline-offset: 3px;
      }

      .button.primary,
      .tab-btn.active {
        background: var(--primary);
        color: #fff;
      }

      .button.secondary,
      .tab-btn {
        background: var(--surface);
        border-color: var(--line);
        color: var(--text);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 58px auto 24px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .tabs {
        margin-top: 0;
        margin-bottom: 18px;
      }

      .tab-btn {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 15px;
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 800;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
        animation: fade-up 360ms ease both;
      }

      .game-card {
        padding: clamp(22px, 4vw, 34px);
      }

      .question {
        margin: 0 0 20px;
        color: var(--text);
        font-size: clamp(1.1rem, 2.4vw, 1.45rem);
        font-weight: 800;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .option-btn {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        background: #fbfdfb;
        color: var(--text);
        text-align: left;
        font-weight: 700;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .option-btn:hover:not(:disabled) {
        border-color: rgba(47, 111, 88, 0.32);
        transform: translateY(-2px);
      }

      .option-btn.correct {
        background: #e8f2ec;
        border-color: var(--primary);
        color: var(--primary-dark);
      }

      .option-btn.wrong {
        background: #fff1eb;
        border-color: var(--accent);
        color: #8b4a2e;
      }

      .option-btn:disabled:not(.correct):not(.wrong) {
        cursor: default;
        opacity: 0.62;
      }

      .feedback {
        min-height: 28px;
        margin: 16px 0 0;
        color: var(--muted);
        font-weight: 700;
      }

      .score-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .score-row strong {
        color: var(--primary-dark);
      }

      .blank-input {
        width: min(180px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        background: #fbfdfb;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .audio-player {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        gap: 28px;
        align-items: center;
        margin-top: 28px;
        overflow: hidden;
        border: 1px solid #263a30;
        border-radius: 20px;
        padding: 22px;
        color: #ffffff;
        background:
          radial-gradient(circle at 12% 18%, rgba(89, 155, 122, 0.28), transparent 180px),
          #17251d;
        box-shadow: 0 22px 48px rgba(23, 37, 29, 0.18);
      }

      .audio-player::after {
        content: "";
        position: absolute;
        right: -70px;
        bottom: -90px;
        width: 220px;
        height: 220px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        box-shadow: 0 0 0 35px rgba(255, 255, 255, 0.025);
        pointer-events: none;
      }

      .audio-artwork {
        position: relative;
        display: grid;
        place-items: center;
        width: 150px;
        aspect-ratio: 1;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        color: #ffffff;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.14), transparent 50%),
          var(--primary);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.2);
      }

      .audio-artwork > .fa-book-bible {
        position: relative;
        z-index: 2;
        font-size: 2.1rem;
      }

      .audio-artwork-ring {
        position: absolute;
        width: 78%;
        height: 78%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        box-shadow: 0 0 0 18px rgba(255, 255, 255, 0.035);
        transition: transform 500ms ease;
      }

      .audio-player.is-playing .audio-artwork-ring {
        animation: audio-ring-spin 8s linear infinite;
      }

      .audio-playing-bars {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 3;
        display: flex;
        align-items: end;
        gap: 3px;
        height: 28px;
        border-radius: 9px;
        padding: 7px 8px;
        background: rgba(23, 37, 29, 0.78);
        backdrop-filter: blur(8px);
      }

      .audio-playing-bars[hidden] {
        display: none;
      }

      .audio-playing-bars i {
        width: 3px;
        height: 8px;
        border-radius: 3px;
        background: #ffffff;
        animation: audio-level 700ms ease-in-out infinite alternate;
      }

      .audio-playing-bars i:nth-child(2) {
        animation-delay: 160ms;
      }

      .audio-playing-bars i:nth-child(3) {
        animation-delay: 320ms;
      }

      .audio-main {
        position: relative;
        z-index: 1;
        min-width: 0;
      }

      .audio-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .audio-copy {
        min-width: 0;
      }

      .audio-label,
      .audio-title,
      .audio-position,
      .audio-message {
        margin: 0;
      }

      .audio-label {
        color: #8fd2ac;
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .audio-title {
        overflow: hidden;
        margin-top: 5px;
        color: #ffffff;
        font-size: clamp(1.12rem, 2.4vw, 1.45rem);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .audio-position {
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.52);
        font-size: 0.72rem;
        font-weight: 700;
      }

      .audio-progress {
        position: relative;
        height: 18px;
        margin-top: 28px;
        cursor: pointer;
        touch-action: none;
      }

      .audio-progress::before,
      .audio-progress-buffer,
      .audio-progress-fill {
        position: absolute;
        top: 50%;
        left: 0;
        height: 4px;
        border-radius: 999px;
        transform: translateY(-50%);
      }

      .audio-progress::before {
        content: "";
        right: 0;
        background: rgba(255, 255, 255, 0.14);
      }

      .audio-progress-buffer {
        width: 0;
        background: rgba(255, 255, 255, 0.18);
      }

      .audio-progress-fill {
        width: 0;
        background: #8fd2ac;
      }

      .audio-progress-thumb {
        position: absolute;
        top: 50%;
        left: 0;
        width: 13px;
        height: 13px;
        border: 3px solid #17251d;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 0 0 2px #8fd2ac;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .audio-progress:hover .audio-progress-thumb,
      .audio-progress:focus-visible .audio-progress-thumb {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .audio-time {
        display: flex;
        justify-content: space-between;
        margin-top: 1px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.68rem;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
      }

      .audio-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 12px;
      }

      .audio-control {
        display: inline-grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 50%;
        color: rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition:
          color 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .audio-control:hover {
        border-color: rgba(255, 255, 255, 0.35);
        color: #ffffff;
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }

      .audio-control.play {
        width: 52px;
        height: 52px;
        border-color: #ffffff;
        color: var(--primary-dark);
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      }

      .audio-control.play:hover {
        color: var(--primary-dark);
        background: #f2f8f4;
      }

      .audio-control.active {
        border-color: #8fd2ac;
        color: #17251d;
        background: #8fd2ac;
      }

      .audio-control:disabled {
        opacity: 0.45;
        cursor: wait;
        transform: none;
      }

      .audio-message {
        min-height: 20px;
        margin-top: 6px;
        color: #f0b69b;
        font-size: 0.72rem;
        text-align: center;
      }

      .audio-player.is-loading .audio-progress-fill {
        width: 28%;
        animation: audio-loading 1.2s ease-in-out infinite alternate;
      }

      .audio-player.is-error {
        border-color: rgba(240, 182, 155, 0.48);
      }

      @keyframes audio-level {
        from {
          height: 5px;
        }
        to {
          height: 15px;
        }
      }

      @keyframes audio-ring-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes audio-loading {
        from {
          transform: translateY(-50%) translateX(0);
        }
        to {
          transform: translateY(-50%) translateX(250%);
        }
      }

      .site-footer {
        margin-top: 80px;
        padding: 30px 6vw;
        background: #17201b;
        color: #fff;
        text-align: center;
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 560px) {
        .verse-nav {
          min-height: 64px;
        }

        .page-hero {
          padding-top: 68px;
        }

        .options {
          grid-template-columns: 1fr;
        }

        .button {
          width: 100%;
        }

        .audio-player {
          grid-template-columns: 1fr;
          gap: 20px;
          padding: 18px;
        }

        .audio-artwork {
          width: min(190px, 64vw);
          justify-self: center;
        }

        .audio-heading {
          align-items: center;
        }

        .audio-controls {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <nav class="verse-nav">
      <a class="brand" href="index.html" aria-label="Trevor home">
        <span class="brand-mark">
          <img src="assets/nav-sticker.jpg" alt="" aria-hidden="true" />
        </span>
        <span>Trevor</span>
      </a>
      <a class="back-link" href="index.html">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Home
      </a>
    </nav>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Daily scripture</p>
        <h1>Word of the Day</h1>
        <p class="hero-sub">A simple daily verse with a few quick Bible games.</p>
      </section>

      <section class="wrap">
        <article class="verse-card">
          <p class="verse-date" id="verse-date">Loading</p>
          <p class="verse-text" id="verse-text">Loading verse...</p>
          <p class="verse-ref" id="verse-ref"></p>
          <div class="actions">
            <button class="button primary" type="button" id="copy-verse">
              <i class="fa-regular fa-copy" aria-hidden="true"></i>
              Copy Verse
            </button>
            <button class="button secondary" type="button" id="share-verse">
              <i class="fa-solid fa-share-nodes" aria-hidden="true"></i>
              Share
            </button>
          </div>

          <div class="audio-player is-loading" id="audio-player">
            <div class="audio-artwork" aria-hidden="true">
              <span class="audio-artwork-ring"></span>
              <i class="fa-solid fa-book-bible"></i>
              <span class="audio-playing-bars" id="audio-playing-bars" hidden>
                <i></i><i></i><i></i>
              </span>
            </div>
            <div class="audio-main">
              <div class="audio-heading">
                <div class="audio-copy">
                  <p class="audio-label" id="audio-status">Loading audio</p>
                  <h3 class="audio-title" id="audio-title">Daily Verse Audio 01</h3>
                  <p class="audio-position" id="audio-position">Track 1 of 2</p>
                </div>
                <button class="audio-control" type="button" id="audio-shuffle" aria-label="Shuffle playlist" aria-pressed="false">
                  <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
                </button>
              </div>

              <div
                class="audio-progress"
                id="audio-progress"
                role="slider"
                aria-label="Audio progress"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
                tabindex="0"
              >
                <span class="audio-progress-buffer"></span>
                <span class="audio-progress-fill" id="audio-progress-fill"></span>
                <span class="audio-progress-thumb" id="audio-progress-thumb"></span>
              </div>
              <div class="audio-time" aria-hidden="true">
                <span id="audio-current">0:00</span>
                <span id="audio-duration">--:--</span>
              </div>

              <div class="audio-controls" aria-label="Audio playlist controls">
                <button class="audio-control" type="button" id="audio-previous" aria-label="Previous track">
                  <i class="fa-solid fa-backward-step" aria-hidden="true"></i>
                </button>
                <button class="audio-control play" type="button" id="audio-toggle" aria-label="Play audio">
                  <i class="fa-solid fa-play" aria-hidden="true"></i>
                </button>
                <button class="audio-control" type="button" id="audio-next" aria-label="Next track">
                  <i class="fa-solid fa-forward-step" aria-hidden="true"></i>
                </button>
              </div>
              <p class="audio-message" id="audio-message" role="status" aria-live="polite"></p>
            </div>
            <audio id="verse-audio" preload="metadata"></audio>
          </div>
        </article>
      </section>

      <section class="wrap">
        <div class="divider">Bible games</div>
        <div class="tabs" role="tablist" aria-label="Bible games">
          <button class="tab-btn active" type="button" data-panel="trivia">Trivia</button>
          <button class="tab-btn" type="button" data-panel="blank">Fill the Blank</button>
          <button class="tab-btn" type="button" data-panel="book">Guess the Book</button>
        </div>

        <div class="panel active" id="panel-trivia">
          <article class="game-card">
            <p class="question" id="trivia-question"></p>
            <div class="options" id="trivia-options"></div>
            <p class="feedback" id="trivia-feedback"></p>
            <div class="score-row">
              <span>Score</span>
              <strong id="trivia-score">0 / 0</strong>
            </div>
          </article>
        </div>

        <div class="panel" id="panel-blank">
          <article class="game-card">
            <p class="question" id="blank-question"></p>
            <div class="actions">
              <input class="blank-input" id="blank-input" placeholder="Your answer" autocomplete="off" />
              <button class="button primary" type="button" id="blank-check">Check</button>
            </div>
            <p class="feedback" id="blank-feedback"></p>
            <div class="score-row">
              <span>Score</span>
              <strong id="blank-score">0 / 0</strong>
            </div>
          </article>
        </div>

        <div class="panel" id="panel-book">
          <article class="game-card">
            <p class="eyebrow">Which book is this from?</p>
            <p class="question" id="book-question"></p>
            <div class="options" id="book-options"></div>
            <p class="feedback" id="book-feedback"></p>
            <div class="score-row">
              <span>Score</span>
              <strong id="book-score">0 / 0</strong>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Trevor</p>
    </footer>

    <script>
      const verses = [
        { text: "For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life.", ref: "John 3:16" },
        { text: "I can do all this through him who gives me strength.", ref: "Philippians 4:13" },
        { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
        { text: "The Lord is my shepherd, I lack nothing.", ref: "Psalm 23:1" },
        { text: "Be strong and courageous. Do not be afraid; do not be discouraged.", ref: "Joshua 1:9" },
        { text: "Cast all your anxiety on him because he cares for you.", ref: "1 Peter 5:7" },
        { text: "And we know that in all things God works for the good of those who love him.", ref: "Romans 8:28" },
        { text: "The Lord bless you and keep you; the Lord make his face shine on you.", ref: "Numbers 6:24-25" },
        { text: "Your word is a lamp for my feet, a light on my path.", ref: "Psalm 119:105" },
        { text: "With God all things are possible.", ref: "Matthew 19:26" },
        { text: "Give thanks to the Lord, for he is good; his love endures forever.", ref: "Psalm 107:1" },
        { text: "If God is for us, who can be against us?", ref: "Romans 8:31" },
        { text: "Create in me a pure heart, O God, and renew a steadfast spirit within me.", ref: "Psalm 51:10" },
        { text: "The grass withers and the flowers fall, but the word of our God endures forever.", ref: "Isaiah 40:8" },
        { text: "Come to me, all you who are weary and burdened, and I will give you rest.", ref: "Matthew 11:28" },
        { text: "Be kind and compassionate to one another, forgiving each other.", ref: "Ephesians 4:32" },
        { text: "Seek first his kingdom and his righteousness, and all these things will be given to you as well.", ref: "Matthew 6:33" },
        { text: "The name of the Lord is a fortified tower; the righteous run to it and are safe.", ref: "Proverbs 18:10" }
      ];

      const trivia = [
        { q: "How many books are in the Bible?", options: ["60", "66", "73", "72"], answer: 1 },
        { q: "Who was swallowed by a great fish?", options: ["Elijah", "Moses", "Jonah", "Noah"], answer: 2 },
        { q: "What was the first miracle Jesus performed?", options: ["Healing a blind man", "Raising Lazarus", "Feeding 5000", "Water to wine"], answer: 3 },
        { q: "In which city was Jesus born?", options: ["Nazareth", "Jerusalem", "Bethlehem", "Capernaum"], answer: 2 },
        { q: "Who built the ark?", options: ["Moses", "Noah", "Abraham", "Jacob"], answer: 1 },
        { q: "Who received the Ten Commandments?", options: ["David", "Moses", "Joshua", "Samuel"], answer: 1 },
        { q: "Who was the first king of Israel?", options: ["David", "Saul", "Solomon", "Samuel"], answer: 1 },
        { q: "Who betrayed Jesus?", options: ["Peter", "Judas", "Thomas", "Andrew"], answer: 1 },
        { q: "How many disciples did Jesus choose?", options: ["7", "10", "12", "40"], answer: 2 },
        { q: "What is the shortest verse in the Bible?", options: ["God is love.", "Jesus wept.", "Pray always.", "Fear not."], answer: 1 },
        { q: "Who defeated Goliath?", options: ["Saul", "David", "Solomon", "Gideon"], answer: 1 },
        { q: "Who was thrown into the lions' den?", options: ["Daniel", "Joseph", "Elijah", "Stephen"], answer: 0 },
        { q: "Who interpreted Pharaoh's dreams?", options: ["Moses", "Aaron", "Joseph", "Isaac"], answer: 2 },
        { q: "What sea did Moses lead Israel through?", options: ["Dead Sea", "Red Sea", "Sea of Galilee", "Mediterranean Sea"], answer: 1 },
        { q: "Who was Jesus' mother?", options: ["Martha", "Mary", "Elizabeth", "Ruth"], answer: 1 }
      ];

      const blanks = [
        { q: "I can do all this through him who gives me ____.", answer: "strength" },
        { q: "The Lord is my ____, I lack nothing.", answer: "shepherd" },
        { q: "Trust in the Lord with all your ____.", answer: "heart" },
        { q: "Your word is a ____ for my feet.", answer: "lamp" },
        { q: "With God all things are ____.", answer: "possible" },
        { q: "Be strong and ____.", answer: "courageous" },
        { q: "Cast all your ____ on him because he cares for you.", answer: "anxiety" },
        { q: "Give ____ to the Lord, for he is good.", answer: "thanks" },
        { q: "Blessed are the ____ in heart.", answer: "pure" },
        { q: "The truth will set you ____.", answer: "free" },
        { q: "Love is patient, love is ____.", answer: "kind" },
        { q: "Seek first his ____ and his righteousness.", answer: "kingdom" }
      ];

      const books = [
        { q: '"In the beginning God created the heavens and the earth."', answer: "Genesis", options: ["Exodus", "Genesis", "Numbers", "Psalms"] },
        { q: '"The Lord is my shepherd; I shall not want."', answer: "Psalms", options: ["Psalms", "Proverbs", "Isaiah", "Job"] },
        { q: '"For God so loved the world that he gave his one and only Son."', answer: "John", options: ["Matthew", "Mark", "Luke", "John"] },
        { q: '"I can do all things through Christ who strengthens me."', answer: "Philippians", options: ["Romans", "Philippians", "Galatians", "Colossians"] },
        { q: '"Love is patient, love is kind."', answer: "1 Corinthians", options: ["1 Corinthians", "Ephesians", "Romans", "James"] },
        { q: '"Trust in the Lord with all your heart."', answer: "Proverbs", options: ["Psalms", "Proverbs", "Ecclesiastes", "Job"] },
        { q: '"Be strong and courageous. Do not be afraid."', answer: "Joshua", options: ["Deuteronomy", "Numbers", "Joshua", "Judges"] },
        { q: '"For the wages of sin is death, but the gift of God is eternal life."', answer: "Romans", options: ["Romans", "Hebrews", "1 John", "Galatians"] },
        { q: '"The Lord bless you and keep you."', answer: "Numbers", options: ["Leviticus", "Numbers", "Deuteronomy", "Exodus"] },
        { q: '"Come to me, all you who are weary and burdened."', answer: "Matthew", options: ["Matthew", "Mark", "Luke", "John"] },
        { q: '"Cast all your anxiety on him because he cares for you."', answer: "1 Peter", options: ["1 Peter", "2 Peter", "James", "Jude"] },
        { q: '"Create in me a pure heart, O God."', answer: "Psalms", options: ["Psalms", "Isaiah", "Jeremiah", "Proverbs"] }
      ];

      const shuffle = (items) => [...items].sort(() => Math.random() - 0.5);

      const audioTracks = [
        {
          title: "Daily Verse Audio 01",
          src: "assets/audio/daily-verse-track-01.mp3"
        },
        {
          title: "Daily Verse Audio 02",
          src: "assets/audio/daily-verse-track-02.mp3"
        }
      ];

      const state = {
        trivia: { index: 0, score: 0, attempts: 0, questions: shuffle(trivia) },
        blank: { index: 0, score: 0, attempts: 0, questions: shuffle(blanks) },
        book: { index: 0, score: 0, attempts: 0, questions: shuffle(books) }
      };

      const audio = document.getElementById("verse-audio");
      const audioPlayer = document.getElementById("audio-player");
      const audioTitle = document.getElementById("audio-title");
      const audioStatus = document.getElementById("audio-status");
      const audioPosition = document.getElementById("audio-position");
      const audioCurrent = document.getElementById("audio-current");
      const audioDuration = document.getElementById("audio-duration");
      const audioProgress = document.getElementById("audio-progress");
      const audioProgressFill = document.getElementById("audio-progress-fill");
      const audioProgressThumb = document.getElementById("audio-progress-thumb");
      const audioProgressBuffer = document.querySelector(".audio-progress-buffer");
      const audioPlayingBars = document.getElementById("audio-playing-bars");
      const audioMessage = document.getElementById("audio-message");
      const audioToggle = document.getElementById("audio-toggle");
      const audioShuffle = document.getElementById("audio-shuffle");
      const audioPrevious = document.getElementById("audio-previous");
      const audioNext = document.getElementById("audio-next");
      let audioIndex = 0;
      let shuffleAudio = false;
      let audioLoadTimer = null;
      let audioLoadId = 0;

      const formatAudioTime = (seconds) => {
        if (!Number.isFinite(seconds)) return "--:--";
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = Math.floor(seconds % 60);
        return `${minutes}:${remainingSeconds.toString().padStart(2, "0")}`;
      };

      const updateAudioButton = () => {
        const isPlaying = !audio.paused;
        audioPlayer.classList.toggle("is-playing", isPlaying);
        audioStatus.textContent = isPlaying ? "Playing now" : "Daily listening";
        audioPlayingBars.hidden = !isPlaying;
        audioToggle.setAttribute("aria-label", isPlaying ? "Pause audio" : "Play audio");
        audioToggle.innerHTML = `<i class="fa-solid fa-${isPlaying ? "pause" : "play"}" aria-hidden="true"></i>`;
      };

      const setAudioLoading = (loading) => {
        if (!loading) {
          window.clearTimeout(audioLoadTimer);
        }
        audioPlayer.classList.toggle("is-loading", loading);
        audioToggle.disabled = loading;
        audioPrevious.disabled = loading;
        audioNext.disabled = loading;
        audioProgress.setAttribute("aria-disabled", String(loading));
        if (loading) {
          audioStatus.textContent = "Loading audio";
        }
      };

      const setAudioError = (message = "") => {
        audioPlayer.classList.toggle("is-error", Boolean(message));
        audioMessage.textContent = message;
      };

      const updateAudioProgress = () => {
        const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
        const percentage = duration ? Math.min(100, (audio.currentTime / duration) * 100) : 0;
        audioProgressFill.style.width = `${percentage}%`;
        audioProgressThumb.style.left = `${percentage}%`;
        audioProgress.setAttribute("aria-valuenow", String(Math.round(percentage)));
        audioCurrent.textContent = formatAudioTime(audio.currentTime);
        audioDuration.textContent = formatAudioTime(duration);
      };

      const updateBufferedProgress = () => {
        if (!audio.duration || !audio.buffered.length) {
          audioProgressBuffer.style.width = "0%";
          return;
        }

        const buffered = audio.buffered.end(audio.buffered.length - 1);
        audioProgressBuffer.style.width = `${Math.min(100, (buffered / audio.duration) * 100)}%`;
      };

      const seekAudio = (percentage) => {
        if (!Number.isFinite(audio.duration) || audioPlayer.classList.contains("is-loading")) {
          return;
        }

        audio.currentTime = Math.max(0, Math.min(audio.duration, audio.duration * percentage));
        updateAudioProgress();
      };

      const loadAudioTrack = (index, playAfterLoad = false) => {
        const loadId = ++audioLoadId;
        audioIndex = (index + audioTracks.length) % audioTracks.length;
        const track = audioTracks[audioIndex];
      setAudioLoading(true);
      setAudioError("");
      audio.pause();
      audio.src = track.src;
        audioTitle.textContent = track.title;
        audioPosition.textContent = `Track ${audioIndex + 1} of ${audioTracks.length}`;
        audioCurrent.textContent = "0:00";
        audioDuration.textContent = "--:--";
        audioProgressFill.style.width = "0%";
        audioProgressThumb.style.left = "0%";
        audioProgressBuffer.style.width = "0%";
        audio.load();
        window.clearTimeout(audioLoadTimer);
        audioLoadTimer = window.setTimeout(() => {
          if (loadId === audioLoadId && audio.readyState === 0) {
            setAudioLoading(false);
            audioStatus.textContent = "Audio unavailable";
            setAudioError("This track could not be decoded. Try another track.");
          }
        }, 8000);
        if (playAfterLoad) {
          const playWhenReady = () => {
            if (loadId !== audioLoadId) return;
            audio.play().catch(() => {
              setAudioError("Playback could not start. Tap play to try again.");
              updateAudioButton();
            });
          };
          audio.addEventListener("canplay", playWhenReady, { once: true });
        }
      };

      const changeAudioTrack = (direction) => {
        if (audioTracks.length === 1) {
          audio.currentTime = 0;
          audio.play().catch(() => updateAudioButton());
          return;
        }

        let nextIndex = audioIndex + direction;
        if (shuffleAudio) {
          do {
            nextIndex = Math.floor(Math.random() * audioTracks.length);
          } while (nextIndex === audioIndex);
        }
        loadAudioTrack(nextIndex, true);
      };

      const todayVerse = () => {
        const start = new Date("2024-01-01");
        const diff = Math.floor((new Date() - start) / 86400000);
        return verses[diff % verses.length];
      };

      const setFeedback = (id, text) => {
        document.getElementById(id).textContent = text;
      };

      const renderDailyVerse = () => {
        const verse = todayVerse();
        document.getElementById("verse-date").textContent = new Date().toLocaleDateString("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });
        document.getElementById("verse-text").textContent = verse.text;
        document.getElementById("verse-ref").textContent = verse.ref;
      };

      const renderOptions = (targetId, options, answer, feedbackId, onCorrect, onDone) => {
        const target = document.getElementById(targetId);
        target.innerHTML = "";
        options.forEach((option, index) => {
          const button = document.createElement("button");
          button.className = "option-btn";
          button.type = "button";
          button.textContent = option;
          button.addEventListener("click", () => {
            target.querySelectorAll("button").forEach((item) => (item.disabled = true));
            if (index === answer) {
              button.classList.add("correct");
              setFeedback(feedbackId, "Correct. Well done.");
              onCorrect();
            } else {
              button.classList.add("wrong");
              target.children[answer].classList.add("correct");
              setFeedback(feedbackId, `The answer was ${options[answer]}.`);
            }
            setTimeout(onDone, 1300);
          });
          target.appendChild(button);
        });
      };

      const renderTrivia = () => {
        if (state.trivia.index >= state.trivia.questions.length) {
          state.trivia.questions = shuffle(trivia);
          state.trivia.index = 0;
        }
        const item = state.trivia.questions[state.trivia.index];
        document.getElementById("trivia-question").textContent = item.q;
        document.getElementById("trivia-score").textContent = `${state.trivia.score} / ${state.trivia.attempts}`;
        setFeedback("trivia-feedback", "");
        renderOptions(
          "trivia-options",
          item.options,
          item.answer,
          "trivia-feedback",
          () => state.trivia.score++,
          () => {
            state.trivia.attempts++;
            state.trivia.index++;
            renderTrivia();
          }
        );
      };

      const renderBlank = () => {
        if (state.blank.index >= state.blank.questions.length) {
          state.blank.questions = shuffle(blanks);
          state.blank.index = 0;
        }
        const item = state.blank.questions[state.blank.index];
        document.getElementById("blank-question").textContent = item.q;
        document.getElementById("blank-input").value = "";
        document.getElementById("blank-score").textContent = `${state.blank.score} / ${state.blank.attempts}`;
        setFeedback("blank-feedback", "");
      };

      const checkBlank = () => {
        const item = state.blank.questions[state.blank.index];
        const input = document.getElementById("blank-input");
        if (!input.value.trim()) return;
        if (input.value.trim().toLowerCase() === item.answer.toLowerCase()) {
          state.blank.score++;
          setFeedback("blank-feedback", `Correct. The word is "${item.answer}".`);
        } else {
          setFeedback("blank-feedback", `The missing word was "${item.answer}".`);
        }
        state.blank.attempts++;
        state.blank.index++;
        document.getElementById("blank-score").textContent = `${state.blank.score} / ${state.blank.attempts}`;
        setTimeout(renderBlank, 1200);
      };

      const renderBook = () => {
        if (state.book.index >= state.book.questions.length) {
          state.book.questions = shuffle(books);
          state.book.index = 0;
        }
        const item = state.book.questions[state.book.index];
        document.getElementById("book-question").textContent = item.q;
        document.getElementById("book-score").textContent = `${state.book.score} / ${state.book.attempts}`;
        setFeedback("book-feedback", "");
        renderOptions(
          "book-options",
          item.options,
          item.options.indexOf(item.answer),
          "book-feedback",
          () => state.book.score++,
          () => {
            state.book.attempts++;
            state.book.index++;
            renderBook();
          }
        );
      };

      document.querySelectorAll(".tab-btn").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((item) => item.classList.remove("active"));
          document.querySelectorAll(".panel").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          document.getElementById(`panel-${button.dataset.panel}`).classList.add("active");
        });
      });

      document.getElementById("copy-verse").addEventListener("click", async () => {
        const verse = todayVerse();
        await navigator.clipboard.writeText(`"${verse.text}" - ${verse.ref}`);
        document.getElementById("copy-verse").innerHTML = '<i class="fa-solid fa-check" aria-hidden="true"></i>Copied';
        setTimeout(() => {
          document.getElementById("copy-verse").innerHTML = '<i class="fa-regular fa-copy" aria-hidden="true"></i>Copy Verse';
        }, 1600);
      });

      document.getElementById("share-verse").addEventListener("click", () => {
        const verse = todayVerse();
        if (navigator.share) {
          navigator.share({ title: "Daily Verse", text: `"${verse.text}" - ${verse.ref}`, url: window.location.href });
        }
      });

      audioToggle.addEventListener("click", () => {
        if (audio.paused) {
          setAudioError("");
          audio.play().catch(() => {
            setAudioError("Playback could not start. Please try again.");
            updateAudioButton();
          });
        } else {
          audio.pause();
        }
      });

      audioPrevious.addEventListener("click", () => changeAudioTrack(-1));
      audioNext.addEventListener("click", () => changeAudioTrack(1));
      audioShuffle.addEventListener("click", () => {
        shuffleAudio = !shuffleAudio;
        audioShuffle.classList.toggle("active", shuffleAudio);
        audioShuffle.setAttribute("aria-pressed", String(shuffleAudio));
        audioMessage.textContent = shuffleAudio ? "Shuffle is on." : "";
      });

      audioProgress.addEventListener("click", (event) => {
        const bounds = audioProgress.getBoundingClientRect();
        seekAudio((event.clientX - bounds.left) / bounds.width);
      });
      audioProgress.addEventListener("keydown", (event) => {
        if (!["ArrowLeft", "ArrowRight", "Home", "End"].includes(event.key)) return;
        event.preventDefault();
        if (event.key === "Home") seekAudio(0);
        else if (event.key === "End") seekAudio(1);
        else {
          const direction = event.key === "ArrowRight" ? 5 : -5;
          if (Number.isFinite(audio.duration)) {
            audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + direction));
            updateAudioProgress();
          }
        }
      });

      audio.addEventListener("loadedmetadata", () => {
        setAudioLoading(false);
        audioStatus.textContent = "Daily listening";
        updateAudioProgress();
      });
      audio.addEventListener("canplay", () => setAudioLoading(false));
      audio.addEventListener("timeupdate", updateAudioProgress);
      audio.addEventListener("progress", updateBufferedProgress);
      audio.addEventListener("play", updateAudioButton);
      audio.addEventListener("pause", updateAudioButton);
      audio.addEventListener("ended", () => changeAudioTrack(1));
      audio.addEventListener("waiting", () => {
        audioStatus.textContent = "Buffering";
      });
      audio.addEventListener("playing", () => {
        audioStatus.textContent = "Playing now";
        setAudioError("");
      });
      audio.addEventListener("error", () => {
        window.clearTimeout(audioLoadTimer);
        setAudioLoading(false);
        audio.pause();
        updateAudioButton();
        setAudioError("This audio track could not be loaded.");
        audioStatus.textContent = "Audio unavailable";
      });

      document.getElementById("blank-check").addEventListener("click", checkBlank);
      document.getElementById("blank-input").addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkBlank();
      });

      renderDailyVerse();
      loadAudioTrack(0);
      renderTrivia();
      renderBlank();
      renderBook();
    </script>
  </body>
</html>
